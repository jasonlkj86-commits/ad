name: Fetch Ad Stats

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: '시작일 (YYYY-MM-DD)'
        required: true
      date_to:
        description: '종료일 (YYYY-MM-DD)'
        required: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch stats from Naver API
        env:
          NAVER_CUSTOMER_ID: ${{ secrets.NAVER_CUSTOMER_ID }}
          NAVER_ACCESS_LICENSE: ${{ secrets.NAVER_ACCESS_LICENSE }}
          NAVER_SECRET_KEY: ${{ secrets.NAVER_SECRET_KEY }}
          DATE_FROM: ${{ github.event.inputs.date_from }}
          DATE_TO: ${{ github.event.inputs.date_to }}
        run: python scripts/fetch_stats.py

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stats.json
          git diff --cached --quiet || git commit -m "data: fetch stats ${{ github.event.inputs.date_from }} ~ ${{ github.event.inputs.date_to }}"
          git push
